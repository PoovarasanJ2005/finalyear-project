<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Group AI - Profile</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container"
        style="max-width: 500px; padding: 2.5rem; background: var(--card-bg); border-radius: 1rem; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <header>
            <div class="logo">
                <span class="icon">👤</span>
                <h1>User Profile</h1>
            </div>
            <p>Manage your professional details</p>
        </header>

        <main>
            {% if msg %}
            <div
                style="background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); color: var(--success); padding: 0.5rem; border-radius: 0.5rem; text-align: center; margin-bottom: 1rem;">
                {{ msg }}
            </div>
            {% endif %}

            <form action="{{ url_for('profile') }}" method="POST"
                style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1rem;">
                <div style="text-align: left;">
                    <label style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">System ID
                        (Username)</label>
                    <input type="text" value="{{ user[0] }}" disabled
                        style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: #0f172a; color: var(--text-muted); border: 1px solid var(--border); margin-top: 0.5rem; font-size: 1rem; box-sizing: border-box; cursor: not-allowed;">
                </div>
                <div style="text-align: left;">
                    <label style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">Update Email</label>
                    <input type="email" name="email" value="{{ user[1] }}" required
                        style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border); margin-top: 0.5rem; font-size: 1rem; box-sizing: border-box;">
                </div>

                <button type="submit" class="primary-btn" style="margin-top: 0.5rem; padding: 1rem;">Save
                    Changes</button>
                <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;"><a
                        href="{{ url_for('dashboard') }}" style="color: var(--primary); text-decoration: none;">&larr;
                        Back to Dashboard</a></p>
            </form>
        </main>
    </div>
</body>

</html>
